  /list-posts:
    get:
      summary: List posts with pagination and filters
      description: |
        Retrieve a paginated list of all your scheduled, draft, published, and failed posts.

        **Pagination behavior:** The `page` and `limit` parameters are silently clamped to valid ranges
        rather than returning errors. `page` is clamped to a minimum of 1, and `limit` is clamped to 1-100.

        **Platform filtering:** The `platform` filter uses case-insensitive prefix matching.
      operationId: listPosts
      tags:
        - Posts
      parameters:
        - name: x-postpost-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: "Page number (1-indexed). Values < 1 are silently clamped to 1."
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          description: "Items per page. Values are silently clamped to range 1-100."
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          required: false
          description: Filter by post status
          schema:
            type: string
            enum: [draft, scheduled, published, failed, partially_published]
        - name: platform
          in: query
          required: false
          description: "Filter by platform (case-insensitive prefix matching)"
          schema:
            type: string
            enum: [twitter, linkedin, instagram, threads, tiktok, youtube, facebook, bluesky, mastodon, telegram]
        - name: sortBy
          in: query
          required: false
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, updatedAt, scheduledTime]
            default: createdAt
        - name: sortOrder
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: fromDate
          in: query
          required: false
          description: Filter posts scheduled after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          required: false
          description: Filter posts scheduled before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  posts:
                    type: array
                    items:
                      type: object
                      properties:
                        postGroupId:
                          type: string
                          example: "507f1f77bcf86cd799439011"
                        content:
                          type: string
                          example: "Excited to share our new product launch!"
                        status:
                          type: string
                          enum: [draft, scheduled, published, failed, partially_published]
                        scheduledTime:
                          type: string
                          format: date-time
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                        platforms:
                          type: array
                          items:
                            type: object
                            properties:
                              platformId:
                                type: string
                              platform:
                                type: string
                              status:
                                type: string
                        mediaUrls:
                          type: array
                          items:
                            type: string
                            format: uri
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      totalItems:
                        type: integer
                        example: 47
                      totalPages:
                        type: integer
                        example: 3
                      hasNextPage:
                        type: boolean
                        example: true
                      hasPrevPage:
                        type: boolean
                        example: false
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidStatus:
                  value: { "error": "Invalid status. Must be one of: draft, scheduled, published, failed, partially_published" }
                invalidSortBy:
                  value: { "error": "Invalid sortBy. Must be one of: createdAt, updatedAt, scheduledTime" }
                invalidFromDate:
                  value: { "error": "Invalid fromDate format" }
                invalidToDate:
                  value: { "error": "Invalid toDate format" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

