                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      url:
                        type: string
                      events:
                        type: array
                        items:
                          type: string
                      secret:
                        type: string
                        description: "Webhook secret for signature verification (only returned on create)"
                      isActive:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "Name, URL, and at least one event are required" }
                invalidUrl:
                  value: { "error": "URL must use HTTPS" }
                invalidEvents:
                  value: { "error": "Invalid events: xyz" }
                limitReached:
                  value: { "error": "Maximum of 10 webhooks per user" }
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

