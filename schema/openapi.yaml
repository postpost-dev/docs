                url:
                  type: string
                  format: uri
                  description: "HTTPS URL to receive webhook events"
                  example: "https://example.com/webhooks/postpost"
                events:
                  type: array
                  items:
                    type: string
                    enum: [post.scheduled, post.published, post.failed, token.expiring]
                  description: "Events to subscribe to"
                  example: ["post.published", "post.failed"]
      responses:
