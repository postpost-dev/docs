                    $ref: "#/components/schemas/ManagedUser"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Email is required"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User with this email already exists"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/{userId}:
    delete:
      summary: Detach a managed user
      description: |
        Remove a user from your workspace. The user account is not deleted,
        but is no longer managed by your workspace.

        **Requires Workspace access - contact serge@postpost.dev to enable.**
      operationId: detachManagedUser
      tags:
        - Workspace
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User detached
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found or not managed by this key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/{userId}/api-key:
    post:
      summary: Generate API key for managed user
      description: |
        Generate a new API key for a managed user. This key can be used
        to make API calls on behalf of the managed user (e.g., create posts
        to their connected social accounts).

        **Requires Workspace access - contact serge@postpost.dev to enable.**
      operationId: generateManagedUserApiKey
      tags:
        - Workspace
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API key generated successfully"
                  apiKey:
                    type: string
                    description: "The generated API key (save it securely - shown only once)"
                    example: "sk_lx5abc.a1b2c3d4e5f6..."
                  userId:
                    type: string
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Workspace or API access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noWorkspace:
                  value: { "error": "Workspace access is not enabled for this key" }
                noApiAccess:
                  value: { "error": "API access is not enabled for this workspace owner" }
        "404":
          description: User not found or not managed by this key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/{userId}/connection-url:
    post:
      summary: Get connection URL for managed user
      description: |
        Get or generate a URL that allows a managed user to connect their
        social media accounts. The URL expires after a configurable period
        (default: 7 days).

        **Requires Workspace access - contact serge@postpost.dev to enable.**
      operationId: getConnectionUrl
      tags:
        - Workspace
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rotate:
                  type: boolean
                  description: "Force generation of a new token even if current is valid"
                  default: false
                expiresInDays:
                  type: integer
                  description: "Number of days until the token expires"
                  default: 7
                  example: 30
      responses:
        "200":
          description: Connection URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    description: "URL for user to connect their social accounts"
                    example: "https://app.postpost.dev/connect/abc123..."
                  tokenExpiresAt:
                    type: string
                    format: date-time
                    description: "When the connection URL expires"
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found or not managed by this key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
