openapi: 3.0.3
info:
  title: PostPost API
  description: |
    Affordable REST API for scheduling and publishing social media posts
    across X/Twitter, LinkedIn, Instagram, Threads, TikTok, YouTube,
    Facebook, Bluesky, Mastodon, and Telegram.

    All plans include full API access. Starting at $5.40/month (yearly) or $9/month.
    14-day free trial, no credit card needed.

    ## Workspace API
    The Workspace API allows you to manage multiple users under a single account.
    **To enable Workspace access, please contact PostPost support at serge@postpost.dev.**
  version: "1.0.0"
  contact:
    email: serge@postpost.dev
    url: https://postpost.dev
servers:
  - url: https://api.postpost.dev/api/v1
    description: Production
security:
  - ApiKeyAuth: []

tags:
  - name: Posts
    description: Create, update, delete, and list posts
  - name: Connections
    description: Manage platform connections
  - name: Media
    description: Upload media files
  - name: LinkedIn Analytics
    description: LinkedIn-specific analytics and interactions
  - name: Webhooks
    description: Manage webhook endpoints for real-time notifications
  - name: Workspace
    description: "Manage multiple users (requires Workspace access - contact support)"
  - name: Logs
    description: Post logs and debugging

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: "API key from Settings > API Keys. Format: sk_timestamp.hexstring"

  schemas:
    PlatformConnection:
      type: object
      properties:
        platformId:
          type: string
          description: "Unique ID in format platform-id (e.g., twitter-123456789)"
          example: "twitter-123456789"
        username:
          type: string
          example: "@yourhandle"
        displayName:
          type: string
          example: "Your Name"
        profileImageUrl:
          type: string
          format: uri
          example: "https://pbs.twimg.com/profile_images/..."
        profileUrl:
          type: string
          format: uri
          nullable: true
          description: "URL to the user's profile on the platform. Can be null if not available for the platform."
          example: "https://twitter.com/yourhandle"
        accessTokenExpiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-15T10:30:00.000Z"
        tokenStatus:
          type: string
          enum: [valid, expiring_soon, expired, unknown]
          description: "Current status of the access token"
          example: "valid"
        tokenExpiresIn:
          type: string
          nullable: true
          description: "Human-readable time until token expiration"
          example: "29 days"
        lastSuccessfulPost:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp of last successful post"
        lastError:
          type: string
          nullable: true
          description: "Last error message if any"

    ManagedUser:
      type: object
      properties:
        _id:
          type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          description: "User email"
          example: "user@example.com"
        displayName:
          type: string
          example: "John Doe"
        role:
          type: string
          enum: [managed]
          example: "managed"
        dailyPostsLeft:
          type: integer
          example: 100
        connectionsPageUrl:
          type: string
          format: uri
          nullable: true
          description: "URL for user to connect their social accounts"
        connectionsPageTokenExpiresAt:
          type: string
          format: date-time
          nullable: true

    Webhook:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          example: "My Webhook"
        url:
          type: string
          format: uri
          example: "https://example.com/webhook"
        events:
          type: array
          items:
            type: string
            enum: [post.scheduled, post.published, post.failed, token.expiring]
          example: ["post.published", "post.failed"]
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PostLog:
      type: object
      properties:
        _id:
          type: string
        postGroupId:
          type: string
        platform:
          type: string
        platformId:
          type: string
        event:
          type: string
          description: "Log event type (e.g., scheduled, processing, published, failed)"
        message:
          type: string
        details:
          type: object
        createdAt:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        platform:
          type: string
          enum: [twitter, linkedin, instagram, threads, tiktok, youtube, facebook, bluesky, mastodon, telegram]
          example: "twitter"
        platformId:
          type: string
          example: "123456789"
        content:
          type: string
          example: "Hello from PostPost API!"
        status:
          type: string
          enum: [draft, scheduled, pending, processing, published, failed]
          example: "published"
        postedId:
          type: string
          description: "Platform-specific post ID (only present if published)"
          example: "1234567890123456789"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid API key"

paths:
  /platform-connections:
    get:
      summary: List connected social accounts
      description: Returns all social media accounts connected to your PostPost account.
      operationId: getPlatformConnections
      tags:
        - Connections
      parameters:
        - name: x-postpost-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
      responses:
        "200":
          description: List of connected accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformConnection"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to fetch platform connections"

  /create-post:
    post:
      summary: Create and schedule a social media post
      description: |
        Create a post to be published across one or more social media platforms.
        Supports text, images (up to 4), and video (1 per post).
        If scheduledTime is provided, the post will be published at that time.
        If omitted, the post is saved as a draft.
      operationId: createPost
      tags:
        - Posts
      parameters:
        - name: x-postpost-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, platforms]
              properties:
                content:
                  type: string
                  description: Post text content
                  example: "Excited to share our new product launch! 🚀 #launch"
                platforms:
                  type: array
                  items:
                    type: string
                  description: "Array of platform connection IDs (format: platform-platformId)"
                  example: ["twitter-123456789", "linkedin-ABC123"]
                scheduledTime:
                  type: string
                  format: date-time
                  description: "ISO 8601 UTC datetime for scheduling. Omit for draft."
                  example: "2026-03-01T14:00:00.000Z"
      responses:
        "200":
          description: Post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  postGroupId:
                    type: string
                    example: "507f1f77bcf86cd799439011"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingContent:
                  value: { "error": "Content is required" }
                invalidTime:
                  value: { "error": "Invalid scheduled time" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Subscription required or free plan limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noSub:
                  value: { "error": "Subscription required" }
                freeLimit:
                  value: { "error": "Free plan limit reached" }
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /get-post/{postGroupId}:
    get:
      summary: Get post details and status
      description: Retrieve the details, platform statuses, and posted IDs for a post group.
      operationId: getPost
      tags:
        - Posts
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
        - name: x-postpost-user-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  postGroupId:
                    type: string
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /update-post/{postGroupId}:
    put:
      summary: Update post timing or status
      description: |
        Modify the scheduled time or status of an existing draft or scheduled post.
        Cannot update posts that are published, failed, pending, or processing.
        At least one of status or scheduledTime must be provided.
        Updating a post group also updates all associated platform-specific posts.
      operationId: updatePost
      tags:
        - Posts
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
        - name: x-postpost-user-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "At least one of status or scheduledTime must be provided"
              properties:
                status:
                  type: string
                  enum: [draft, scheduled]
                  description: "New status"
                scheduledTime:
                  type: string
                  format: date-time
                  description: "New ISO 8601 UTC scheduled time (must be in the future)"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Post updated successfully"
                  postGroup:
                    type: object
                    properties:
                      _id:
                        type: string
                      status:
                        type: string
                      scheduledTime:
                        type: string
                        format: date-time
                        description: "Only included if post has a scheduled time"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "Either status or scheduledTime must be provided" }
                invalidStatus:
                  value: { "error": "Status must be either 'draft' or 'scheduled'" }
                invalidTimeFormat:
                  value: { "error": "Invalid scheduled time format" }
                pastTime:
                  value: { "error": "Scheduled time cannot be in the past" }
                cannotUpdate:
                  value: { "error": "Cannot update post: post is currently in published status" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group not found"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to update post"

  /delete-post/{postGroupId}:
    delete:
      summary: Delete a scheduled post
      description: |
        Delete a post group and all associated data. This operation removes:
        - The post group record
        - All platform-specific posts (Twitter, LinkedIn, Instagram, etc.)
        - All media file records from the database
        - All media files from S3 storage

        The database deletion is atomic (uses MongoDB transaction). S3 deletion
        failures are logged but do not fail the request.
      operationId: deletePost
      tags:
        - Posts
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
        - name: x-postpost-user-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "404":
          description: Post group not found (ID doesn't exist or belongs to another user)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group not found"
        "500":
          description: Server error during deletion (transaction rolled back)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to delete post group"

  /get-upload-url:
    post:
      summary: Get pre-signed URL for media upload
      description: |
        Get a pre-signed S3 URL to upload images or videos.
        Upload the file directly to S3 via HTTP PUT, then create a post.
        Upload URLs expire in 1 hour. Max 4 images or 1 video per post.
      operationId: getUploadUrl
      tags:
        - Media
      parameters:
        - name: x-postpost-user-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType, type, postGroupId]
              properties:
                fileName:
                  type: string
                  example: "photo.jpg"
                contentType:
                  type: string
                  description: "MIME type (image/jpeg, image/png, video/mp4, etc.)"
                  example: "image/jpeg"
                type:
                  type: string
                  enum: [image, video]
                  example: "image"
                postGroupId:
                  type: string
                  description: "Post group to attach media to"
                  example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Upload URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uploadUrl:
                    type: string
                    format: uri
                    description: "Pre-signed S3 URL. PUT your file here."
                  fileUrl:
                    type: string
                    format: uri
                    description: "Public URL after upload"
                  mediaId:
                    type: string
                    description: "Media record ID"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFileName:
                  value: { "error": "fileName is required" }
                missingContentType:
                  value: { "error": "contentType is required" }
                missingType:
                  value: { "error": "type is required" }
                missingPostGroupId:
                  value: { "error": "postGroupId is required" }
                invalidContentType:
                  value: { "error": "Invalid content type" }
                invalidType:
                  value: { "error": "Invalid type" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                serverError:
                  value: { "error": "Server error" }

  /linkedin-post-statistics:
    post:
      summary: Get LinkedIn post analytics
      description: |
        Retrieve analytics for a LinkedIn post: impressions, reach, reactions, comments, reshares.
        Results are cached for 30 minutes. Use queryTypes: "ALL" to get all 5 metrics at once.
      operationId: getLinkedInPostStatistics
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postedId, platformId]
              properties:
                postedId:
                  type: string
                  description: "LinkedIn URN or share ID"
                  example: "urn:li:share:7123456789012345678"
                platformId:
                  type: string
                  description: "LinkedIn connection ID"
                  example: "linkedin-Tz9W5i6ZYG"
                queryType:
                  type: string
                  enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                  description: "Single metric to fetch"
                queryTypes:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                    - type: string
                      enum: ["ALL"]
                  description: "Multiple metrics or ALL"
                  example: "ALL"
      responses:
        "200":
          description: Statistics retrieved
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Single metric response
                    properties:
                      success:
                        type: boolean
                      count:
                        type: integer
                        example: 1542
                      cached:
                        type: boolean
                  - type: object
                    description: Multiple metrics response
                    properties:
                      success:
                        type: boolean
                      metrics:
                        type: object
                        properties:
                          IMPRESSION:
                            type: integer
                          MEMBERS_REACHED:
                            type: integer
                          RESHARE:
                            type: integer
                          REACTION:
                            type: integer
                          COMMENT:
                            type: integer
                      cached:
                        type: boolean
        "400":
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPostedId:
                  value:
                    error: "postedId is required"
                missingPlatformId:
                  value:
                    error: "platformId is required"
                invalidQueryType:
                  value:
                    error: "Invalid queryType. Must be one of: IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT"
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "LinkedIn connection not found"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to fetch post statistics"

  /linkedin-account-statistics:
    post:
      summary: Get aggregated LinkedIn account analytics
      description: Get total metrics across all published LinkedIn posts for an account.
      operationId: getLinkedInAccountStatistics
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platformId]
              properties:
                platformId:
                  type: string
                  example: "linkedin-Tz9W5i6ZYG"
                queryType:
                  type: string
                  enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                  description: "Single metric to fetch"
                queryTypes:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                    - type: string
                      enum: ["ALL"]
                  description: "Multiple metrics or ALL"
                  example: "ALL"
                aggregation:
                  type: string
                  enum: [TOTAL, DAILY]
                  default: TOTAL
                  description: "Aggregation type: TOTAL (default) or DAILY"
                dateRange:
                  type: object
                  description: "Optional date range filter"
                  properties:
                    start:
                      type: object
                      properties:
                        year:
                          type: integer
                        month:
                          type: integer
                        day:
                          type: integer
                    end:
                      type: object
                      properties:
                        year:
                          type: integer
                        month:
                          type: integer
                        day:
                          type: integer
      responses:
        "200":
          description: Account statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  metrics:
                    type: object
                    description: "Flexible object with dynamic metric keys (e.g., IMPRESSION, REACTION, etc.)"
                    additionalProperties:
                      type: integer
                  aggregation:
                    type: string
                    enum: [TOTAL, DAILY]
                  cached:
                    type: boolean
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPlatformId:
                  value: { "error": "platformId is required" }
                invalidQueryType:
                  value: { "error": "Invalid queryType" }
                invalidAggregation:
                  value: { "error": "Invalid aggregation" }
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /linkedin-profile-summary:
    post:
      summary: Get LinkedIn profile summary
      description: |
        Retrieve a summary of your LinkedIn profile analytics including follower counts
        and aggregated post engagement metrics. Optionally filter by date range to track
        follower growth over a specific period.
      operationId: getLinkedInProfileSummary
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platformId]
              properties:
                platformId:
                  type: string
                  description: "LinkedIn connection ID (format: linkedin-{id})"
                  example: "linkedin-Tz9W5i6ZYG"
                dateRange:
                  type: object
                  description: "Optional date range for filtering metrics and calculating follower growth"
                  properties:
                    start:
                      type: object
                      properties:
                        year:
                          type: integer
                          example: 2026
                        month:
                          type: integer
                          example: 1
                        day:
                          type: integer
                          example: 1
                    end:
                      type: object
                      properties:
                        year:
                          type: integer
                          example: 2026
                        month:
                          type: integer
                          example: 1
                        day:
                          type: integer
                          example: 31
      responses:
        "200":
          description: Profile summary retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  partialData:
                    type: boolean
                    description: "True if some data failed to fetch but partial results are available"
                  profile:
                    type: object
                    properties:
                      followers:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: "Total follower count"
                            example: 5000
                          periodGrowth:
                            type: integer
                            description: "Follower growth during date range (only present when dateRange is provided)"
                            example: 150
                      posts:
                        type: object
                        properties:
                          totalImpressions:
                            type: integer
                            example: 25000
                          totalReactions:
                            type: integer
                            example: 500
                          totalComments:
                            type: integer
                            example: 75
                          totalReshares:
                            type: integer
                            example: 30
                  errors:
                    type: array
                    items:
                      type: string
                    description: "List of errors when partialData is true"
                    example: ["Failed to fetch followers"]
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPlatformId:
                  value: { "error": "platformId is required" }
                invalidDateRange:
                  value: { "error": "Invalid dateRange format" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "LinkedIn connection not found"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: All requests to LinkedIn failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "All requests failed"

  /linkedin-followers:
    post:
      summary: Get LinkedIn follower statistics
      description: |
        Retrieve follower statistics for your LinkedIn account.
        Use period="lifetime" (default) for total follower count, or period="daily" with a dateRange for daily growth data.
        Results are cached for improved performance.
      operationId: getLinkedInFollowers
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platformId]
              properties:
                platformId:
                  type: string
                  description: "LinkedIn connection ID"
                  example: "linkedin-Tz9W5i6ZYG"
                period:
                  type: string
                  enum: [lifetime, daily]
                  default: lifetime
                  description: "Type of statistics to retrieve"
                  example: "lifetime"
                dateRange:
                  type: object
                  description: "Required when period is 'daily'"
                  properties:
                    start:
                      type: object
                      properties:
                        year:
                          type: integer
                          example: 2024
                        month:
                          type: integer
                          example: 1
                        day:
                          type: integer
                          example: 1
                    end:
                      type: object
                      properties:
                        year:
                          type: integer
                          example: 2024
                        month:
                          type: integer
                          example: 1
                        day:
                          type: integer
                          example: 31
      responses:
        "200":
          description: Follower statistics retrieved
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Lifetime response
                    properties:
                      success:
                        type: boolean
                        example: true
                      followersCount:
                        type: integer
                        example: 1234
                      cached:
                        type: boolean
                  - type: object
                    description: Daily response
                    properties:
                      success:
                        type: boolean
                        example: true
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              example: "2024-01-15"
                            count:
                              type: integer
                              example: 10
                      totalGrowth:
                        type: integer
                        example: 25
                      cached:
                        type: boolean
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPlatformId:
                  value: { "error": "platformId is required" }
                invalidPeriod:
                  value: { "error": "Invalid period" }
                missingDateRange:
                  value: { "error": "dateRange is required for daily period" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to fetch statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                fetchFailed:
                  value: { "error": "Failed to fetch followers statistics" }

